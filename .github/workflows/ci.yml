name: CI Pipeline

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "*.txt"
      - LICENSE
      - .gitignore
      - .env.example
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "*.txt"
      - LICENSE
      - .gitignore
      - .env.example

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  # ─── Frontend Unit Tests ────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run test

  # ─── Edge Function Tests ────────────────────────────────────────────────────
  edge-function-tests:
    name: Edge Function Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx vitest run -c supabase/functions/__tests__/vitest.config.ts

  # ─── Hard Technical Audit (Crash Tests) ─────────────────────────────────────
  crash-test:
    name: Hard Technical Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: "2.8.2"
      - name: Run audit suite
        run: deno run --frozen --no-prompt -A scripts/audit/_run_all.ts
      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hard-audit-evidence
          path: .omo/evidence/hard-audit/
          retention-days: 7
