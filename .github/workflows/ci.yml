name: crash-test
on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "*.txt"
      - LICENSE
      - .gitignore
      - .env.example
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "*.txt"
      - LICENSE
      - .gitignore
      - .env.example

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  crash-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: "2.8.2"
      - run: deno run --frozen --no-prompt -A scripts/audit/_run_all.ts
