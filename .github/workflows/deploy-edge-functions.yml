---
name: deploy-edge-functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/deploy-all.sh"

concurrency:
  group: ${{ github.ref }}-deploy-edge
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: "2.8.2"

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy All Edge Functions
        run: bash supabase/deploy-all.sh --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Health Check
        run: |
          echo "Running health check..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/functions/v1/health" || echo "000")
          echo "Health endpoint returned: $RESPONSE"
          if [[ "$RESPONSE" != "200" && "$RESPONSE" != "401" ]]; then
            echo "⚠️ Health check failed (HTTP $RESPONSE), but deployment may still be valid"
          fi
