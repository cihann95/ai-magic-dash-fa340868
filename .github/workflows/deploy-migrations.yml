name: deploy-migrations

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"

concurrency:
  group: deploy-migrations-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write
  checks: write

env:
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_STAGING_REF: ${{ secrets.SUPABASE_STAGING_REF }}
  SUPABASE_PROD_REF: ${{ secrets.SUPABASE_PROD_REF }}

jobs:
  # ─── verify-migration-order ──────────────────────────────────────────────────
  verify-migration-order:
    name: Verify Migration Order
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Verify migration ordering
        run: npx tsx scripts/verify-migration-order.ts

  # ─── deploy-staging ──────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [verify-migration-order]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link staging project
        run: supabase link --project-ref $SUPABASE_STAGING_REF
      - name: Push migrations to staging
        run: supabase db push

  # ─── verify-staging ──────────────────────────────────────────────────────────
  verify-staging:
    name: Verify Staging Deployment
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link staging project
        run: supabase link --project-ref $SUPABASE_STAGING_REF
      - name: Verify RLS policies exist
        run: |
          echo "::group::RLS Policies"
          supabase db query "SELECT schemaname, tablename, policyname, permissive, roles, cmd FROM pg_policies WHERE schemaname = 'public' ORDER BY tablename, policyname;"
          echo "::endgroup::"
      - name: Verify triggers exist
        run: |
          echo "::group::Triggers"
          supabase db query "SELECT trigger_name, event_manipulation, event_object_table, action_timing FROM information_schema.triggers WHERE trigger_schema = 'public' ORDER BY event_object_table, trigger_name;"
          echo "::endgroup::"
      - name: Verify functions exist
        run: |
          echo "::group::Functions"
          supabase db query "SELECT routine_name, routine_type, data_type FROM information_schema.routines WHERE specific_schema = 'public' AND routine_type IN ('FUNCTION','PROCEDURE') ORDER BY routine_name;"
          echo "::endgroup::"

  # ─── manual-gate ─────────────────────────────────────────────────────────────
  manual-gate:
    name: Manual Approval Gate
    runs-on: ubuntu-latest
    needs: [verify-staging]
    environment:
      name: production
    timeout-minutes: 60
    steps:
      - name: Awaiting production approval
        run: echo "⏸ Manual approval required before deploying to production"

  # ─── deploy-production ───────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [manual-gate]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link production project
        run: supabase link --project-ref $SUPABASE_PROD_REF
      - name: Push migrations to production
        run: supabase db push

  # ─── verify-production ───────────────────────────────────────────────────────
  verify-production:
    name: Verify Production Deployment
    runs-on: ubuntu-latest
    needs: [deploy-production]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link production project
        run: supabase link --project-ref $SUPABASE_PROD_REF
      - name: Verify RLS policies exist
        run: |
          echo "::group::RLS Policies"
          supabase db query "SELECT schemaname, tablename, policyname, permissive, roles, cmd FROM pg_policies WHERE schemaname = 'public' ORDER BY tablename, policyname;"
          echo "::endgroup::"
      - name: Verify triggers exist
        run: |
          echo "::group::Triggers"
          supabase db query "SELECT trigger_name, event_manipulation, event_object_table, action_timing FROM information_schema.triggers WHERE trigger_schema = 'public' ORDER BY event_object_table, trigger_name;"
          echo "::endgroup::"
      - name: Verify functions exist
        run: |
          echo "::group::Functions"
          supabase db query "SELECT routine_name, routine_type, data_type FROM information_schema.routines WHERE specific_schema = 'public' AND routine_type IN ('FUNCTION','PROCEDURE') ORDER BY routine_name;"
          echo "::endgroup::"

  # ─── rollback-on-failure ─────────────────────────────────────────────────────
  rollback-on-failure:
    name: Rollback on Failure
    if: ${{ always() && (needs.deploy-staging.result == 'failure' || needs.verify-staging.result == 'failure' || needs.deploy-production.result == 'failure' || needs.verify-production.result == 'failure') }}
    runs-on: ubuntu-latest
    needs: [deploy-staging, verify-staging, deploy-production, verify-production]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Report deployment failure
        run: |
          echo "❌ Migration deployment FAILED at one or more stages."
          echo ""
          echo "Staging deploy:      ${{ needs.deploy-staging.result }}"
          echo "Staging verify:      ${{ needs.verify-staging.result }}"
          echo "Production deploy:   ${{ needs.deploy-production.result }}"
          echo "Production verify:   ${{ needs.verify-production.result }}"
      - name: Trigger rollback procedure
        run: |
          echo "🚨 ROLLBACK REQUIRED"
          echo ""
          echo "Supabase uses forward-only migrations — automatic revert is not supported."
          echo "To roll back, create a corrective migration that reverts the breaking changes."
          echo ""
          echo "Steps:"
          echo "  1. Create a new migration in supabase/migrations/"
          echo "  2. Write SQL to revert the failed migration's changes"
          echo "  3. Push via: supabase link --project-ref \$REF && supabase db push"
          echo ""
          echo "See: .omo/reports/rollback-plan.md"
